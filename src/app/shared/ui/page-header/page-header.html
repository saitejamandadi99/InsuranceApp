<div class="page-header">
    <div>
        <h1 class="page-heading">{{title}}</h1>
        <p class="page-description">{{subtitle}}</p>
    </div>
    <button
    *ngIf="buttonText"
    class="btn btn-primary-custom"
    (click)="onButtonClick()">

    <i *ngIf="buttonIcon" class="{{buttonIcon}}"></i>
    {{buttonText}}

</button>
</div>
