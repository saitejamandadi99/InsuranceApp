<div class="container-fluid py-4">

    <div class="mb-4">
        <h1 class="page-title">
            <i class="bi bi-shield-lock-fill me-2"></i>
            Admin Dashboard
        </h1>
        <p class="page-subtitle">Manage users, products, policies, claims, and payments.</p>
    </div>

    @for(section of sections; track section.heading){

        <div class="mb-4">

            <h5 class="section-heading">{{ section.heading }}</h5>

            <div class="row g-3">

                @for(card of section.cards; track card.title){

                    <div class="col-lg-3 col-md-4 col-sm-6">

                        <div class="app-card dashboard-card" [routerLink]="card.route">

                            <div class="icon-chip" [ngClass]="'chip-' + card.color">
                                <i [class]="card.icon"></i>
                            </div>

                            <h6 class="card-title-custom">{{ card.title }}</h6>
                            <p class="card-subtitle-custom">{{ card.subtitle }}</p>

                        </div>

                    </div>

                }

            </div>

        </div>

    }

</div>
