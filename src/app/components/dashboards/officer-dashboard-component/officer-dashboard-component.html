<div class="container-fluid py-4">

    <div class="mb-4 dashboard-header">
        <h1 class="page-title">
            <i class="bi bi-person-badge-fill me-2"></i>
            Officer Dashboard
        </h1>
        <p class="page-subtitle">Review claims, manage policies, and track customer records.</p>
    </div>

    <div class="dashboard-grid">

        @for(section of sections; track section.heading){
            @for(card of section.cards; track card.title){

                <div class="app-card dashboard-card" [routerLink]="card.route">

                    <div class="icon-chip" [ngClass]="'chip-' + card.color">
                        <i [class]="card.icon"></i>
                    </div>

                    <h6 class="card-title-custom">{{ card.title }}</h6>
                    <p class="card-subtitle-custom">{{ card.subtitle }}</p>

                </div>

            }
        }

    </div>

</div>
