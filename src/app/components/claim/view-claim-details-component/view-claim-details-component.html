<div class="container-fluid py-4">

    <app-page-header
        title="Claim Details"
        subtitle="View your insurance claim information."
        buttonText="Back to My Claims"
        buttonIcon="bi bi-arrow-left"
        (buttonClick)="navigateToMyClaims()">
    </app-page-header>

    @if(isLoading){

        <app-loading-spinner></app-loading-spinner>

    }

    @else{

        <div class="row justify-content-center">

            <div class="col-lg-9">

                <div class="app-card">

                    <div class="card-header-custom">

                        <h4 class="mb-0">

                            <i class="bi bi-file-earmark-medical me-2"></i>
                            Claim Information

                        </h4>

                    </div>

                    <div class="card-body">

                        <div class="row">

                            <div class="col-md-6 mb-4">

                                <label class="form-label-custom">Claim Number</label>

                                <input
                                    type="text"
                                    class="form-control input-dark"
                                    [value]="claim.claimNumber"
                                    readonly>

                            </div>

                            <div class="col-md-6 mb-4">

                                <label class="form-label-custom">Claim Status</label>

                                <div class="mt-2">

                                    <app-status-badge
                                        [status]="claim.claimStatus">
                                    </app-status-badge>

                                </div>

                            </div>

                            <div class="col-md-6 mb-4">

                                <label class="form-label-custom">Policy Number</label>

                                <input
                                    type="text"
                                    class="form-control input-dark"
                                    [value]="claim.policyNumber"
                                    readonly>

                            </div>

                            <div class="col-md-6 mb-4">

                                <label class="form-label-custom">Claim Amount</label>

                                <input
                                    type="text"
                                    class="form-control input-dark"
                                    [value]="claim.claimAmount | currency:'INR':'symbol':'1.2-2'"
                                    readonly>

                            </div>

                            <div class="col-md-6 mb-4">

                                <label class="form-label-custom">Incident Date</label>

                                <input
                                    type="text"
                                    class="form-control input-dark"
                                    [value]="claim.incidentDate | date:'dd-MM-yyyy'"
                                    readonly>

                            </div>

                            <div class="col-md-6 mb-4">

                                <label class="form-label-custom">Created Date</label>

                                <input
                                    type="text"
                                    class="form-control input-dark"
                                    [value]="claim.createdDate | date:'dd-MM-yyyy hh:mm a'"
                                    readonly>

                            </div>

                            <div class="col-md-6 mb-4">

                                <label class="form-label-custom">Last Updated</label>

                                <input
                                    type="text"
                                    class="form-control input-dark"
                                    [value]="claim.updatedDate | date:'dd-MM-yyyy hh:mm a'"
                                    readonly>

                            </div>

                            <div class="col-12 mb-4">

                                <label class="form-label-custom">Claim Reason</label>

                                <textarea
                                    rows="4"
                                    class="form-control input-dark"
                                    readonly>{{claim.claimReason}}</textarea>

                            </div>

                        </div>

                        <hr class="my-4">

                        <h5 class="mb-4">

                            <i class="bi bi-chat-left-text me-2"></i>
                            Review Information

                        </h5>

                        <div class="row">

                            <div class="col-12 mb-4">

                                <label class="form-label-custom">Officer Remarks</label>

                                <textarea
                                    rows="4"
                                    class="form-control input-dark"
                                    readonly>{{claim.officerRemarks || 'No remarks available.'}}</textarea>

                            </div>

                            <div class="col-12 mb-4">

                                <label class="form-label-custom">Admin Remarks</label>

                                <textarea
                                    rows="4"
                                    class="form-control input-dark"
                                    readonly>{{claim.adminRemarks || 'No remarks available.'}}</textarea>

                            </div>

                        </div>

                        <div class="d-flex justify-content-end mt-4">

                            <button
                                type="button"
                                class="btn btn-secondary-custom"
                                (click)="navigateToMyClaims()">

                                <i class="bi bi-arrow-left me-2"></i>
                                Back to My Claims

                            </button>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    }

</div>
