<div class="container-fluid py-4">

    <app-page-header
        title="Officer Claim Review"
        subtitle="Review the submitted claim and provide your recommendation.">
    </app-page-header>

    @if(isLoading){

        <app-loading-spinner></app-loading-spinner>

    }

    @else if(claim){

        <div class="row justify-content-center">

            <div class="col-lg-9">

                <div class="app-card">

                    <div class="card-header-custom">
                        <h4 class="mb-0"><i class="bi bi-file-earmark-medical me-2"></i>Claim Information</h4>
                    </div>

                    <div class="card-body">

                        <div class="row">

                            <div class="col-md-6 mb-4">
                                <label class="form-label-custom">Claim Number</label>
                                <p class="mb-0 fw-semibold text-light">{{claim.claimNumber}}</p>
                            </div>

                            <div class="col-md-6 mb-4">
                                <label class="form-label-custom">Policy Number</label>
                                <p class="mb-0 fw-semibold text-light">{{claim.policyNumber}}</p>
                            </div>

                            <div class="col-md-6 mb-4">
                                <label class="form-label-custom">Customer Name</label>
                                <p class="mb-0 fw-semibold text-light">{{claim.customerName}}</p>
                            </div>

                            <div class="col-md-6 mb-4">
                                <label class="form-label-custom">Claim Amount</label>
                                <p class="mb-0 fw-semibold text-light">{{claim.claimAmount | currency:'INR':'symbol':'1.2-2'}}</p>
                            </div>

                            <div class="col-md-6 mb-4">
                                <label class="form-label-custom">Incident Date</label>
                                <p class="mb-0 fw-semibold text-light">{{claim.incidentDate | date:'dd-MM-yyyy'}}</p>
                            </div>

                            <div class="col-md-6 mb-4">
                                <label class="form-label-custom">Current Status</label>

                                <div class="mt-1">
                                    <app-status-badge [status]="claim.claimStatus"></app-status-badge>
                                </div>

                            </div>

                            <div class="col-12 mb-4">

                                <label class="form-label-custom">Claim Reason</label>

                                <div class="app-card p-3 mt-2">
                                    <p class="mb-0 text-light">{{claim.claimReason}}</p>
                                </div>

                            </div>

                        </div>

                        <div class="card-header-custom mt-4">
                            <h5 class="mb-0 text-light"><i class="bi bi-person-check me-2"></i>Officer Recommendation</h5>
                        </div>

                        <form
                            class="mt-4"
                            [formGroup]="reviewForm"
                            (ngSubmit)="reviewClaim()">

                            <div class="mb-4">

                                <label class="form-label-custom">Recommendation</label>

                                <select
                                    class="form-select input-dark"
                                    formControlName="claimStatus">

                                    <option value="">Select Recommendation</option>
                                    <option [value]="claimStatus.RecommendedForApproval">
                                        Recommend for Approval
                                    </option>
                                    <option [value]="claimStatus.RecommendedForRejection">
                                        Recommend for Rejection
                                    </option>

                                </select>

                            </div>

                            <div class="mb-4">

                                <label class="form-label-custom">Officer Remarks</label>

                                <textarea
                                    rows="4"
                                    class="form-control input-dark"
                                    formControlName="officerRemarks"
                                    placeholder="Enter your review remarks">
                                </textarea>

                            </div>

                            <div class="d-flex justify-content-end gap-3">

                                <button
                                    type="button"
                                    class="btn btn-secondary-custom"
                                    (click)="navigateToClaims()">

                                    Cancel

                                </button>

                                <button
                                    type="submit"
                                    class="btn btn-primary-custom"
                                    [disabled]="reviewForm.invalid">

                                    Submit Recommendation

                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    }

</div>
