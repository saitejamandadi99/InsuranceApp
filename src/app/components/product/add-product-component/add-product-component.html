<div class="container-fluid py-4">

    <app-page-header
        title="Add Product"
        subtitle="Create a new insurance product for the system.">
    </app-page-header>

    @if(isLoading){

        <app-loading-spinner></app-loading-spinner>

    }

    @else{

        <div class="row justify-content-center mt-4">

            <div class="col-12 col-xl-8 col-lg-9 col-md-10">

                <div class="app-card">

                    <div class="card-header-custom">

                        <h4 class="mb-0">
                            <i class="bi bi-box-seam me-2"></i>
                            Product Information
                        </h4>

                    </div>

                    <div class="card-body">

                        <form
                            [formGroup]="productForm"
                            (ngSubmit)="addProduct()">

                            <div class="row">

                                <div class="col-md-6 mb-4">

                                    <label class="form-label-custom">
                                        Product Name
                                    </label>

                                    <input
                                        type="text"
                                        class="form-control input-dark"
                                        formControlName="productName"
                                        placeholder="Enter product name">

                                    <div
                                        class="mt-2 text-danger"
                                        *ngIf="productName.touched && productName.invalid">

                                        <small *ngIf="productName.errors?.['required']">
                                            Product name is required.
                                        </small>

                                        <small *ngIf="productName.errors?.['minlength']">
                                            Product name must be at least 3 characters.
                                        </small>

                                        <small *ngIf="productName.errors?.['maxlength']">
                                            Product name cannot exceed 100 characters.
                                        </small>

                                    </div>

                                </div>

                                <div class="col-md-6 mb-4">

                                    <label class="form-label-custom">
                                        Product Type
                                    </label>

                                    <select
                                        class="form-select input-dark"
                                        formControlName="productType">

                                        <option value="">Select Product Type</option>

                                        @for(type of productTypes; track type){

                                            <option [value]="type">
                                                {{type}}
                                            </option>

                                        }

                                    </select>

                                    <div
                                        class="mt-2 text-danger"
                                        *ngIf="productType.touched && productType.invalid">

                                        <small>
                                            Product type is required.
                                        </small>

                                    </div>

                                </div>

                                <div class="col-12 mb-4">

                                    <label class="form-label-custom">
                                        Description
                                    </label>

                                    <textarea
                                        rows="5"
                                        class="form-control input-dark"
                                        formControlName="description"
                                        placeholder="Enter product description">
                                    </textarea>

                                    <div
                                        class="mt-2 text-danger"
                                        *ngIf="description.touched && description.invalid">

                                        <small *ngIf="description.errors?.['required']">
                                            Description is required.
                                        </small>

                                        <small *ngIf="description.errors?.['minlength']">
                                            Description must be at least 3 characters.
                                        </small>

                                        <small *ngIf="description.errors?.['maxlength']">
                                            Description cannot exceed 200 characters.
                                        </small>

                                    </div>

                                </div>

                            </div>

                            <div class="d-flex justify-content-end gap-3 mt-4">

                                <button
                                    type="button"
                                    class="btn btn-secondary-custom"
                                    (click)="navigateToProducts()">

                                    Cancel

                                </button>

                                <button
                                    type="submit"
                                    class="btn btn-primary-custom"
                                    [disabled]="productForm.invalid">

                                    <i class="bi bi-plus-circle me-2"></i>
                                    Add Product

                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    }

</div>
