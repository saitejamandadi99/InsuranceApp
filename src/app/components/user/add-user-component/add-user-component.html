<div class="container-fluid py-4">

    <app-page-header
        title="Add Officer"
        subtitle="Register a new officer in the insurance management system."
        buttonText="Back to Users"
        buttonIcon="bi bi-arrow-left"
        (buttonClick)="navigateToUsers()">
    </app-page-header>

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="app-card">

                <div class="card-header-custom">
                    <h4 class="mb-0">
                        <i class="bi bi-person-plus me-2"></i>
                        Officer Registration
                    </h4>
                </div>

                <div class="card-body">

                    <form [formGroup]="userForm" (ngSubmit)="addUser()">

                        <div class="row">

                            <div class="col-md-6 mb-4">

                                <label class="form-label-custom">
                                    Full Name
                                </label>

                                <input
                                    type="text"
                                    class="form-control input-dark"
                                    formControlName="fullName"
                                    placeholder="Enter full name">

                                <div class="mt-1" *ngIf="getfullName().invalid && (getfullName().dirty || getfullName().touched)">

                                    <small class="text-danger" *ngIf="getfullName().hasError('required')">
                                        Full Name is required.
                                    </small>

                                    <small class="text-danger" *ngIf="getfullName().hasError('minlength')">
                                        Minimum 3 characters required.
                                    </small>

                                    <small class="text-danger" *ngIf="getfullName().hasError('maxlength')">
                                        Maximum 50 characters allowed.
                                    </small>

                                </div>

                            </div>

                            <div class="col-md-6 mb-4">

                                <label class="form-label-custom">
                                    Email
                                </label>

                                <input
                                    type="email"
                                    class="form-control input-dark"
                                    formControlName="email"
                                    placeholder="Enter email">

                                <div class="mt-1" *ngIf="getemail().invalid && (getemail().dirty || getemail().touched)">

                                    <small class="text-danger" *ngIf="getemail().hasError('required')">
                                        Email is required.
                                    </small>

                                    <small class="text-danger" *ngIf="getemail().hasError('email')">
                                        Enter a valid email.
                                    </small>

                                </div>

                            </div>

                            <div class="col-md-6 mb-4">

                                <label class="form-label-custom">
                                    Password
                                </label>

                                <input
                                    type="password"
                                    class="form-control input-dark"
                                    formControlName="password"
                                    placeholder="Enter password">

                                <div class="mt-1" *ngIf="getpassword().invalid && (getpassword().dirty || getpassword().touched)">

                                    <small class="text-danger" *ngIf="getpassword().hasError('required')">
                                        Password is required.
                                    </small>

                                    <small class="text-danger" *ngIf="getpassword().hasError('minlength')">
                                        Minimum 8 characters required.
                                    </small>

                                    <small class="text-danger" *ngIf="getpassword().hasError('maxlength')">
                                        Maximum 20 characters allowed.
                                    </small>

                                </div>

                            </div>

                            <div class="col-md-6 mb-4">

                                <label class="form-label-custom">
                                    Mobile Number
                                </label>

                                <input
                                    type="text"
                                    class="form-control input-dark"
                                    formControlName="mobileNumber"
                                    placeholder="9876543210">

                                <div class="mt-1" *ngIf="getmobileNumber().invalid && (getmobileNumber().dirty || getmobileNumber().touched)">

                                    <small class="text-danger" *ngIf="getmobileNumber().hasError('required')">
                                        Mobile Number is required.
                                    </small>

                                    <small class="text-danger" *ngIf="getmobileNumber().hasError('pattern')">
                                        Enter a valid mobile number.
                                    </small>

                                </div>

                            </div>

                        </div>

                        <div class="d-flex justify-content-end gap-3 mt-4">

                            <button
                                type="button"
                                class="btn btn-secondary-custom"
                                (click)="navigateToUsers()">

                                Cancel

                            </button>

                            <button
                                type="submit"
                                class="btn btn-primary-custom"
                                [disabled]="userForm.invalid">

                                <i class="bi bi-check-circle me-2"></i>
                                Add Officer

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>
