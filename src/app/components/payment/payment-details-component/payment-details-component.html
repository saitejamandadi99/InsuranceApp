<div class="container-fluid py-4">

    <app-page-header
        title="Payment Details"
        subtitle="View payment transaction information.">
    </app-page-header>

    @if(isLoading){

        <app-loading-spinner></app-loading-spinner>

    }

    @else{

    <div class="row justify-content-center">

        <div class="col-12 col-xl-10 col-xxl-9">

            <div class="app-card p-4">

                <div class="row g-4">

                    <div class="col-md-6">

                        <label class="form-label-custom">
                            Payment #
                        </label>

                        <div class="form-control input-dark">

                            {{payment.paymentId}}

                        </div>

                    </div>

                    <div class="col-md-6">

                        <label class="form-label-custom">
                            Policy Number
                        </label>

                        <div class="form-control input-dark">

                            {{payment.policyNumber}}

                        </div>

                    </div>

                    <div class="col-md-6">

                        <label class="form-label-custom">
                            Amount
                        </label>

                        <div class="form-control input-dark">

                            {{payment.amount | currency:'INR':'symbol':'1.2-2'}}

                        </div>

                    </div>

                    <div class="col-md-6">

                        <label class="form-label-custom">
                            Payment Date
                        </label>

                        <div class="form-control input-dark">

                            {{payment.paymentDate | date:'dd-MM-yyyy'}}

                        </div>

                    </div>

                    <div class="col-md-6">

                        <label class="form-label-custom">
                            Payment Mode
                        </label>

                        <div class="form-control input-dark">

                            {{payment.paymentMode}}

                        </div>

                    </div>

                    <div class="col-md-6">

                        <label class="form-label-custom">
                            Payment Status
                        </label>

                        <div class="pt-2">

                            <app-status-badge
                                [status]="payment.paymentStatus">
                            </app-status-badge>

                        </div>

                    </div>

                    <div class="col-12">

                        <label class="form-label-custom">
                            Transaction Reference
                        </label>

                        <div class="form-control input-dark">

                            {{payment.transactionReference}}

                        </div>

                    </div>

                </div>

                <div class="d-flex justify-content-end mt-4">

                    <button
                        type="button"
                        class="btn btn-secondary-custom"
                        (click)="navigateBack()">

                        Back

                    </button>

                </div>

            </div>

        </div>

    </div>

}

</div>
