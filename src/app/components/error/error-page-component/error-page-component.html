<div class="container-fluid vh-100 d-flex align-items-center justify-content-center">

    <div class="col-lg-6 col-xl-5">

        <div class="app-card error-card text-center">

            <div class="error-number">

                404

            </div>

            <div class="icon-badge purple mx-auto mb-4">

                <i class="bi bi-exclamation-triangle"></i>

            </div>

            <h1 class="error-title">

                Oops! Page Not Found

            </h1>

            <p class="error-description">

                The page you're looking for doesn't exist or may have been moved.
                Please return to the dashboard to continue using the application.

            </p>

            <button class="btn btn-primary-custom mt-4" (click)="navigateToDashboard()">
                <i class="bi bi-house-door me-2"></i>
                Go to Dashboard
            </button>

        </div>

    </div>

</div>
