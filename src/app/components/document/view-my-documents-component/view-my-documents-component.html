<div class="container-fluid py-4">

    <app-page-header
        title="My Documents"
        subtitle="View and manage documents you've uploaded for your claims."
        buttonText="Upload Document"
        buttonIcon="bi bi-cloud-upload"
        (buttonClick)="navigateToAddDocument()">
    </app-page-header>

    <div class="row justify-content-center">

        <div class="col-12 col-xl-12 col-xxl-11">

            <app-filter-card>

                <app-search-box
                    [searchControl]="searchControl"
                    placeholder="Search by Document Name, Type, or Claim Number"
                    (clear)="clearSearch()">
                </app-search-box>

            </app-filter-card>

        </div>

    </div>

    @if(isLoading){

        <app-loading-spinner></app-loading-spinner>

    }

    @else{

        @if(filteredDocuments.length > 0){

            <div class="row justify-content-center mt-4">

                <div class="col-12 col-xl-12 col-xxl-11">

                    <div class="table-responsive app-card">

                        <table class="table table-hover align-middle table-dark-custom">

                            <thead>

                                <tr>

                                    <th>Claim #</th>
                                    <th>Document Name</th>
                                    <th>Document Type</th>
                                    <th>Uploaded Date</th>
                                    <th class="text-center">Actions</th>

                                </tr>

                            </thead>

                            <tbody>

                                <tr *ngFor="let doc of filteredDocuments">

                                    <td>{{doc.claimNumber}}</td>
                                    <td>{{doc.documentName}}</td>
                                    <td>{{doc.documentType}}</td>
                                    <td>{{doc.uploadedDate | date:'dd-MM-yyyy hh:mm a'}}</td>

                                    <td class="text-center">

                                        <app-action-buttons
                                            [actions]="['view','delete']"
                                            (actionClick)="onDocAction($event, doc.documentId)">
                                        </app-action-buttons>

                                    </td>

                                </tr>

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        }

        @else{

            <app-empty-state
                icon="bi bi-file-earmark-text"
                title="No Documents Found"
                message="You haven't uploaded any claim documents yet."
                buttonText="Upload Document"
                (buttonClick)="navigateToAddDocument()">
            </app-empty-state>

        }

    }

</div>
