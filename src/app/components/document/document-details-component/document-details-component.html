<div class="container-fluid py-4">

    <app-page-header
        title="Document Details"
        subtitle="View claim document information."
        buttonText="Back"
        buttonIcon="bi bi-arrow-left"
        (buttonClick)="goBack()">
    </app-page-header>

    <div *ngIf="isLoading">
        <app-loading-spinner></app-loading-spinner>
    </div>

    <div *ngIf="!isLoading" class="row justify-content-center">

        <div class="col-lg-8">

            <div class="app-card">

                <div class="card-header-custom">
                    <h4 class="mb-0">
                        <i class="bi bi-file-earmark-text me-2"></i>
                        Document Information
                    </h4>
                </div>

                <div class="card-body">

                    <div class="row">

                        <div class="col-md-6 mb-4">
                            <label class="form-label-custom">Claim Number</label>
                            <input type="text" class="form-control input-dark" [value]="document.claimNumber" readonly>
                        </div>

                        <div class="col-md-6 mb-4">
                            <label class="form-label-custom">Uploaded Date</label>
                            <input type="text" class="form-control input-dark" [value]="document.uploadedDate | date:'dd-MM-yyyy hh:mm a'" readonly>
                        </div>

                        <div class="col-md-6 mb-4">
                            <label class="form-label-custom">Document Name</label>
                            <input type="text" class="form-control input-dark" [value]="document.documentName" readonly>
                        </div>

                        <div class="col-md-6 mb-4">
                            <label class="form-label-custom">Document Type</label>
                            <input type="text" class="form-control input-dark" [value]="document.documentType" readonly>
                        </div>

                        <div class="col-12 mb-4">
                            <label class="form-label-custom">Document Reference</label>
                            <input type="text" class="form-control input-dark" [value]="document.documentReference" readonly>
                        </div>

                    </div>

                    <div class="d-flex justify-content-end mt-4">
                        <button type="button" class="btn btn-secondary-custom" (click)="goBack()">
                            <i class="bi bi-arrow-left me-2"></i>
                            Back
                        </button>
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>
